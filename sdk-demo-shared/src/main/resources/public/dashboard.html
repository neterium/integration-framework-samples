<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard</title>
    <link href="css/neterium.css" rel="stylesheet">
    <script src="js/dashboard.js" type="text/javascript"></script>
</head>

<body>

<div class="right">
    <label for="refreshRate">AutoRefresh:</label>
    &nbsp;
    <select id="refreshRate">
        <option value="-1">Off</option>
        <option value="1000">1 sec</option>
        <option selected="selected" value="1500">1,5 sec</option>
        <option value="2000">2 sec</option>
        <option value="5000">5 sec</option>
    </select>
</div>

<h1>Dashboard</h1>

<div class="section">
    <div class="section-title">Screening</div>
    <div class="section-subtitle">Aggregated statistics <b>since application startup</b></div>
    <div class="metrics" id="screeningMetrics">
        <!-- Metrics will be populated by JS -->
    </div>
</div>

<div class="section">
    <div class="section-title">Throttling</div>
    <div class="section-subtitle">Statistics on sliding window of <b>last
        <span id="throttlingWindowSize">?</span>
    </b></div>
    <div class="metrics" id="throttlingMetrics">
        <!-- Metrics will be populated by JS -->
    </div>
</div>

<div class="section">
    <div class="section-title">SpringBatch</div>
    <div class="section-subtitle">Statistics on <b>last executed</b> job
        (more detailed information available <a href="job-results.html" target="_blank">here</a>)
    </div>
    <div class="metrics" id="jobMetrics">
        <!-- Metrics will be populated by JS -->
    </div>
</div>

<script>
    // Initial load
    window.onload = () => fetchMetrics();
    // Set auto-refresh
    let timerId = setInterval(fetchMetrics, 1_500);
    // Listen for changes
    document.getElementById("refreshRate")
        .addEventListener("change", function () {
            if (timerId !== null) {
                clearInterval(timerId);
            }
            const newInterval = parseInt(this.value);
            if (newInterval > 0) {
                timerId = setInterval(fetchMetrics, newInterval);
            }
        });
</script>

</body>
</html>
