<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Database</title>
    <link href="css/neterium.css" rel="stylesheet">
    <script src="js/counterparts.js" type="text/javascript"></script>
</head>

<body>

<h1>Counterparts</h1>

<div style="overflow: auto; height: 515px; width: 100%;">
    <table style="width: 100%;">
        <thead>
        <tr>
            <th>ID</th>
            <th>LastName</th>
            <th>FirstName</th>
            <th>DateOfBirth</th>
            <th>Gender</th>
            <th>ImportDate</th>
            <th>LastScreened</th>
            <th class="number">Matches</th>
            <th class="number">Ignored</th>
            <th class="number">Alerts</th>
        </tr>
        </thead>
        <tbody id="counterpartsTable">
        <!-- Rows will be populated by JS -->
        </tbody>
    </table>
</div>


<h3>Matches</h3>

<table>
    <thead>
    <tr>
        <th>MatchID</th>
        <th>ProfileID</th>
        <th>MatchedText</th>
        <th>Score</th>
        <th>Level</th>
        <th>Checksum</th>
        <th>LastModified</th>
        <th>Decision</th>
    </tr>
    </thead>
    <tbody id="matchesTable">
    <!-- Rows will be populated by JS -->
    </tbody>
</table>

<script>
    let currentRow;
    // Initial load
    window.onload = () => fetchCounterparts();
    // Handle click on row
    document.addEventListener("DOMContentLoaded", function () {
        const table = document.getElementById("counterpartsTable");
        table.addEventListener("click", function (event) {
            const row = event.target.closest("tr");
            if (!row || row.parentNode.tagName === "THEAD") return; // ignore header
            if (currentRow) {
                currentRow.classList.remove("clicked");
            }
            currentRow = row;
            currentRow.classList.add("clicked");
            const idCell = currentRow.cells[0];
            const idValue = idCell.textContent.trim();
            fetchMatches(idValue);
        });
    });
</script>

</body>
</html>
